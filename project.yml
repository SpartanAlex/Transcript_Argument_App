name: ConversationCoach
options:
  bundleIdPrefix: com.alexbelotz
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: UKT8TSAW8A
targets:
  ConversationCoach:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - ConversationCoach
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexbelotz.ConversationCoach
        PRODUCT_NAME: ConversationCoach
        INFOPLIST_FILE: Config/ConversationCoachInfo.plist
        TARGETED_DEVICE_FAMILY: "1,2"
  ConversationCoachTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - ConversationCoachTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ConversationCoach
